<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Gerador de Orçamentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>


</head>

<body class="bg-gray-100 p-6">
    <div class="max-w-3xl mx-auto bg-white shadow-md p-8 rounded-lg">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center border-b pb-4">Gerador de Orçamentos</h1>
        
        <form id="orcamentoForm" class="space-y-6">
            <div>
                <h3 class="text-lg font-semibold text-gray-700 mb-3">Dados do Orçamento</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="numeroOrcamento" type="text" placeholder="Número do orçamento" class="w-full p-2 border rounded focus:outline-blue-500">
                    <input id="dataOrcamento" type="date" class="w-full p-2 border rounded focus:outline-blue-500">
                    <input id="validadeOrcamento" type="date" class="w-full p-2 border rounded focus:outline-blue-500">
                </div>
            </div>

            <div>
                <h3 class="text-lg font-semibold text-gray-700 mb-3">Dados do Cliente</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input id="nomeCliente" type="text" placeholder="Nome do Cliente" class="w-full p-2 border rounded focus:outline-blue-500">
                    <input id="telefoneCliente" type="text" placeholder="Telefone" class="w-full p-2 border rounded focus:outline-blue-500">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input id="emailCliente" type="email" placeholder="Email" class="w-full p-2 border rounded focus:outline-blue-500">
                    <input id="cpfCliente" type="text" placeholder="CPF/CNPJ" class="w-full p-2 border rounded focus:outline-blue-500">
                </div>
                <input id="enderecoCliente" type="text" placeholder="Endereço Completo" class="w-full p-2 border rounded focus:outline-blue-500">
            </div>

            <div>
                <h3 class="text-lg font-semibold text-gray-700 mb-3">Serviço</h3>
                <textarea id="servico" rows="4" placeholder="Descreva o serviço detalhadamente..." class="w-full p-2 border rounded focus:outline-blue-500"></textarea>
            </div>

            <div>
                <h3 class="text-lg font-semibold text-gray-700 mb-3">Valores (R$)</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">Subtotal</label>
                        <input id="subtotal" type="number" step="0.01" value="0.00" class="w-full p-2 border rounded focus:outline-blue-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">Acréscimo</label>
                        <input id="acrescimo" type="number" step="0.01" value="0.00" class="w-full p-2 border rounded focus:outline-blue-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">Desconto</label>
                        <input id="desconto" type="number" step="0.01" value="0.00" class="w-full p-2 border rounded focus:outline-blue-500">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1 font-bold text-gray-700">Total Geral</label>
                        <input id="total" type="text" value="R$ 0,00" readonly class="w-full p-2 border rounded bg-gray-50 font-bold text-blue-600 focus:outline-none">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Forma de pagamento</h3>
                    <input id="formaPagamento" type="text" placeholder="Ex: Pix, Boleto, Cartão" class="w-full p-2 border rounded focus:outline-blue-500">
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Observações</h3>
                    <textarea id="observacoes" rows="2" placeholder="Observações do orçamento..." class="w-full p-2 border rounded focus:outline-blue-500"></textarea>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-end space-y-2 sm:space-y-0 sm:space-x-4 pt-4 border-t">
                <button type="button" onclick="limparFormulario()" class="px-6 py-2 bg-gray-500 text-white rounded font-semibold hover:bg-gray-600 transition">
                    Limpar Formulário
                </button>
                <button type="button" onclick="gerarPDF()" class="px-6 py-2 bg-blue-600 text-white rounded font-semibold hover:bg-blue-700 transition">
                    Gerar PDF
                </button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
